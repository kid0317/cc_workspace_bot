# 记忆提炼定时任务模板
# 每小时触发一次，从历史对话中提炼新信息补充到 memory 文件。
# 由 init_companion_workspace.sh 初始化时填入具体值。

id: __APP_ID__-memory-distill
app_id: __FEISHU_APP_ID__
name: memory_distill
target_type: __TARGET_TYPE__   # p2p 或 group
target_id: __TARGET_ID__
cron: "0 * * * *"              # 每小时整点触发
enabled: true                  # 默认开启；initialization_status != done 时 skill 自动静默退出
prompt: |
  加载 __WORKSPACE_DIR__/.claude/skills/memory_distill/SKILL.md，执行记忆提炼流程。
  无新消息时静默退出，不写入任何内容。
