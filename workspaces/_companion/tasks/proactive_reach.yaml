# 主动唤醒定时任务模板
# 由初始化阶段三完成后，由 Claude 根据用户偏好填入具体值并激活。
# id, target_type, target_id 由初始化脚本从 user_profile.md 解析 routing_key 后写入。

id: __APP_ID__-proactive
app_id: __FEISHU_APP_ID__
name: proactive_reach
target_type: __TARGET_TYPE__   # p2p 或 group（从 routing_key 解析）
target_id: __TARGET_ID__       # 从 routing_key 提取（去掉 "p2p:" 或 "group:" 前缀）
cron: "0 10,20 * * *"          # 默认每天 10:00 和 20:00，根据用户偏好调整
enabled: true                  # 默认开启；initialization_status != done 时 skill 自动静默退出
prompt: |
  加载 __WORKSPACE_DIR__/.claude/skills/proactive/SKILL.md，执行主动唤醒判断流程。
  routing_key 优先从 <system_routing> 上下文块读取；若无则从 memory/user_profile.md 的【飞书发送目标】字段读取。
