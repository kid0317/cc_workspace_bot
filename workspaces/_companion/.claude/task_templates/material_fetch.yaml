# 素材抓取定时任务模板
# 每6小时触发一次，从小红书/X.com/Reddit 抓取内容写入 material_pool.md。
# send_output: false 表示此任务产出不发送给用户（后台静默执行）。

name: material_fetch
target_type: __TARGET_TYPE__   # p2p 或 group（从 SESSION_CONTEXT.md Channel key 解析）
target_id: __TARGET_ID__       # 从 Channel key 提取
cron: "0 */6 * * *"            # 每6小时触发（0/6/12/18时）
enabled: true
send_output: false             # 后台任务：禁止向用户发送任何文字
prompt: |
  加载 __WORKSPACE_DIR__/.claude/skills/material_fetch/SKILL.md，执行素材抓取：
  从小红书/X.com/Reddit 获取当日素材，写入 memory/material_pool.md（不输出任何文字）。
  WORKSPACE_DIR=__WORKSPACE_DIR__
