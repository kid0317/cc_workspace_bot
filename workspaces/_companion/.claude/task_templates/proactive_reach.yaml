# 主动唤醒定时任务模板
# 由 Claude 在 phase2_done 时从 SESSION_CONTEXT.md 解析占位符后写入 tasks/ 目录。
#
# 注意：
# - id 字段由文件名自动推断（proactive_reach.yaml → id: proactive_reach），无需填写
# - app_id 由 Watcher 从文件路径推断，无需填写
# - send_output: true（默认），主动触达任务需要向用户发送消息

name: proactive_reach
target_type: __TARGET_TYPE__   # p2p 或 group（从 SESSION_CONTEXT.md Channel key 解析）
target_id: __TARGET_ID__       # 从 Channel key 提取
cron: "23 8-22 * * *"            # 每小时 :23 分触发（约15次/天），由 SKILL.md 内概率控制实际发送（期望1-2次/天）
enabled: true
send_output: false             # 由 SKILL.md 调用 send_and_record.py 显式发送，runner 不转发
prompt: |
  加载 __WORKSPACE_DIR__/.claude/skills/proactive/SKILL.md，以作者身份执行主动唤醒判断：
  判断是否应向用户发送主动消息，若是则创作台词并通过 send_and_record.py 投递（不向 stdout 输出任何文字）。
  routing_key 优先从 <system_routing> 上下文块读取；若无则从 memory/user_profile.md 的【飞书发送目标】字段读取。
